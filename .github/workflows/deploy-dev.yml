name: 🚀 Deploy DEV

on:
  push:
    branches:
      - develop

jobs:
  deploy-frontend-dev:
    name: 🎨 Frontend → DEV EC2
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔨 Build for DEVELOPMENT
        run: npm run build:dev
        env:
          VITE_API_URL: ${{ secrets.DEV_BACKEND_URL }}
          VITE_APP_ENV: development
          VITE_APP_TITLE: MyApp (Dev)

      - name: 🔐 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEV_EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 📤 Upload build to DEV EC2
        run: |
          rsync -avz --delete dist/ \
            ${{ secrets.DEV_EC2_USER }}@${{ secrets.DEV_EC2_HOST }}:/var/www/frontend/

      - name: 🔁 Reload Nginx on DEV EC2
        run: |
          ssh ${{ secrets.DEV_EC2_USER }}@${{ secrets.DEV_EC2_HOST }} \
            "sudo systemctl reload nginx"

  deploy-backend-dev:
    name: ⚙️ Backend → DEV EC2
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔨 Compile TypeScript
        run: npm run build

      - name: ✅ Verify dist exists
        run: ls -la dist/

      - name: 🔐 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEV_EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 📁 Prepare backend directory on EC2
        run: |
          ssh ${{ secrets.DEV_EC2_USER }}@${{ secrets.DEV_EC2_HOST }} \
            "mkdir -p /var/www/backend/dist"

      - name: 📤 Upload compiled backend to DEV EC2
        run: |
          rsync -avz --delete dist/ \
            ${{ secrets.DEV_EC2_USER }}@${{ secrets.DEV_EC2_HOST }}:/var/www/backend/dist/
          rsync -avz package.json \
            ${{ secrets.DEV_EC2_USER }}@${{ secrets.DEV_EC2_HOST }}:/var/www/backend/

      - name: 📦 Install prod dependencies on DEV EC2
        run: |
          ssh ${{ secrets.DEV_EC2_USER }}@${{ secrets.DEV_EC2_HOST }} \
            "cd /var/www/backend && npm install --omit=dev"

      - name: 🔁 Start or Restart backend on DEV EC2 (PM2)
        run: |
          ssh ${{ secrets.DEV_EC2_USER }}@${{ secrets.DEV_EC2_HOST }} "
            cd /var/www/backend
            if pm2 describe backend-dev > /dev/null 2>&1; then
              pm2 restart backend-dev --update-env
            else
              NODE_ENV=development pm2 start dist/index.js --name backend-dev
            fi
            pm2 save
          "
