name: 🚀 Deploy PROD

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend-prod:
    name: 🎨 Frontend → PROD EC2
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔨 Build for PRODUCTION
        run: npm run build:prod
        env:
          VITE_API_URL: ${{ secrets.PROD_BACKEND_URL }}
          VITE_APP_ENV: production
          VITE_APP_TITLE: MyApp

      - name: 🔐 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PROD_EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 📤 Upload build to PROD EC2
        run: |
          rsync -avz --delete dist/ \
            ${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }}:/var/www/frontend/

      - name: 🔁 Reload Nginx on PROD EC2
        run: |
          ssh ${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }} \
            "sudo systemctl reload nginx"

  deploy-backend-prod:
    name: ⚙️ Backend → PROD EC2
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔨 Compile TypeScript
        run: npm run build

      - name: ✅ Verify dist exists
        run: ls -la dist/

      - name: 🔐 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PROD_EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 📁 Prepare backend directory on EC2
        run: |
          ssh ${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }} \
            "mkdir -p /var/www/backend/dist"

      - name: 📤 Upload compiled backend to PROD EC2
        run: |
          rsync -avz --delete dist/ \
            ${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }}:/var/www/backend/dist/
          rsync -avz package.json \
            ${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }}:/var/www/backend/

      - name: 📦 Install prod dependencies on PROD EC2
        run: |
          ssh ${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }} \
            "cd /var/www/backend && npm install --omit=dev"

      - name: 🔁 Start or Restart backend on PROD EC2 (PM2)
        run: |
          ssh ${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }} "
            cd /var/www/backend
            if pm2 describe backend-prod > /dev/null 2>&1; then
              pm2 restart backend-prod --update-env
            else
              NODE_ENV=production pm2 start dist/index.js --name backend-prod
            fi
            pm2 save
          "
