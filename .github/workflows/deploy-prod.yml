name: 🚀 Deploy PROD

on:
  push:
    branches:
      - main   # Push to main → deploys to PROD EC2

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Deploy FRONTEND to PROD EC2
  # ─────────────────────────────────────────────
  deploy-frontend-prod:
    name: 🎨 Frontend → PROD EC2
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build for PRODUCTION
        run: npm run build:prod
        env:
          VITE_API_URL: ${{ secrets.PROD_BACKEND_URL }}
          VITE_APP_ENV: production
          VITE_APP_TITLE: MyApp

      - name: 🔐 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PROD_EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 📤 Upload build to PROD EC2
        run: |
          rsync -avz --delete dist/ \
            ${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }}:/var/www/frontend/

      - name: 🔁 Reload Nginx on PROD EC2
        run: |
          ssh ${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }} \
            "sudo systemctl reload nginx"

  # ─────────────────────────────────────────────
  # JOB 2: Build & Deploy BACKEND to PROD EC2
  # ─────────────────────────────────────────────
  deploy-backend-prod:
    name: ⚙️ Backend → PROD EC2
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Compile TypeScript
        run: npm run build

      - name: 🔐 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PROD_EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 📤 Upload compiled backend to PROD EC2
        run: |
          rsync -avz --delete \
            dist/ package.json package-lock.json \
            ${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }}:/var/www/backend/

      - name: 📦 Install prod dependencies on PROD EC2
        run: |
          ssh ${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }} \
            "cd /var/www/backend && npm ci --omit=dev"

      - name: 🔁 Restart backend on PROD EC2 (PM2)
        run: |
          ssh ${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }} \
            "cd /var/www/backend && NODE_ENV=production pm2 restart backend-prod || pm2 start dist/index.js --name backend-prod --env production"

      - name: 💾 Save PM2 process list
        run: |
          ssh ${{ secrets.PROD_EC2_USER }}@${{ secrets.PROD_EC2_HOST }} "pm2 save"
