# /etc/nginx/sites-available/myapp
# Copy this file to your EC2 and symlink:
#   sudo ln -s /etc/nginx/sites-available/myapp /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name your-ec2-ip-or-domain;   # ← replace with actual IP or domain

    # ── Frontend (React SPA) ──────────────────────────────────
    root /var/www/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # SPA fallback for React Router
    }

    # ── Backend API (proxied to Node.js on port 5000) ─────────
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
